<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<div class="player-container">

    <div class="top-bar">

        <h2>🎧 Sanjana's Music Player</h2>

        <button id="themeBtn">
            🌙
        </button>

    </div>

    <div class="cover">

        <img
        id="cover"
        src="images/cover1.jpg"
        alt="cover">

    </div>

    <div class="song-info">

        <h3 id="title">
            Song Title
        </h3>

        <p id="artist">
            Artist Name
        </p>

    </div>

    <audio id="audio"></audio>

    <div class="progress-container">

        <span id="currentTime">
            0:00
        </span>

        <input
        type="range"
        id="progress"
        value="0">

        <span id="duration">
            0:00
        </span>

    </div>

    <div class="controls">

        <button id="prev">
            <i class="fa-solid fa-backward"></i>
        </button>

        <button id="play">
            <i class="fa-solid fa-play"></i>
        </button>

        <button id="next">
            <i class="fa-solid fa-forward"></i>
        </button>

    </div>

    <div class="volume">

        <i class="fa-solid fa-volume-high"></i>

        <input
        type="range"
        id="volume"
        min="0"
        max="1"
        step="0.1"
        value="1">

    </div>

    <div class="playlist">

        <h3>Playlist</h3>

        <ul id="playlist">

        </ul>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
